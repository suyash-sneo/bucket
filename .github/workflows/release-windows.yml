name: release-windows

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      VERSION: ${{ github.event.inputs.release_version }}
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        shell: pwsh
        run: go test ./...

      - name: Build (windows-amd64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -ldflags "-s -w" -o "dist/bucket-${env:VERSION}-windows-amd64.exe" ./cmd/bucket

      - name: Package (windows-amd64)
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/bucket-${env:VERSION}-windows-amd64.exe" -DestinationPath "dist/bucket-${env:VERSION}-windows-amd64.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bucket-windows-amd64
          path: dist/bucket-${{ env.VERSION }}-windows-amd64.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bucket-windows-amd64
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: buckets ${{ github.event.inputs.release_version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/bucket-${{ github.event.inputs.release_version }}-windows-amd64.zip
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
