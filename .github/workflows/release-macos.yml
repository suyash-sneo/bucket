name: release-macos

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release tag (e.g. v1.2.3)"
        required: true
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    env:
      VERSION: ${{ github.event.inputs.release_version }}
      ARCH: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build (arm64)
        env:
          GOOS: darwin
          GOARCH: ${{ env.ARCH }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags "-s -w" -o dist/bucket-${VERSION}-${GOARCH} ./cmd/bucket

      - name: Package (arm64)
        run: |
          cd dist
          tar -czf bucket-${VERSION}-${ARCH}.tar.gz bucket-${VERSION}-${ARCH}

      - name: Upload artifact (arm64)
        uses: actions/upload-artifact@v4
        with:
          name: bucket-${{ env.ARCH }}
          path: dist/bucket-${{ env.VERSION }}-${{ env.ARCH }}.tar.gz
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bucket-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.release_version }}
          name: buckets ${{ github.event.inputs.release_version }}
          prerelease: ${{ github.event.inputs.prerelease }}
          files: dist/bucket-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
